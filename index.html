<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مدير مهام العائلة</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --border: #e5e7eb;
      --title-color: #1e3a8a;
      --date-color: #0f766e;
      --task-color: #111827;
      --box-color: #2563eb;
      --radius: 14px;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Tahoma", "Arial", sans-serif;
    }

    body {
      background: linear-gradient(145deg, #eff6ff, var(--bg));
      color: var(--text);
      line-height: 1.6;
      padding: 16px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .header-card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 14px;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-title {
      color: var(--title-color);
      font-size: 1.8rem;
      text-align: center;
      font-weight: 800;
    }

    .top-date {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--date-color);
      font-weight: 700;
      font-size: 0.95rem;
      text-align: left;
      direction: ltr;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 1.2rem;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .home-buttons {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(150px, 1fr));
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: 0.15s;
    }

    .btn-main {
      background: var(--primary);
      color: #fff;
    }

    .btn-main:hover {
      background: var(--primary-dark);
    }

    .btn-back {
      background: #e5e7eb;
      color: #1f2937;
    }

    .btn-back:hover {
      background: #d1d5db;
    }

    .btn-delete {
      background: #fee2e2;
      color: var(--danger);
    }

    .btn-delete:hover {
      background: #fecaca;
    }

    .btn-edit {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .btn-edit:hover {
      background: #bfdbfe;
    }

    .btn-print {
      background: #0f766e;
      color: #fff;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      font-size: 1.06rem;
    }

    .btn-print:hover {
      background: #0d625c;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    form {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-weight: 700;
      font-size: 0.94rem;
    }

    input[type="text"],
    input[type="number"],
    select {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      outline: none;
      background: #fff;
    }

    .schedule-types {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
    }

    .option {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .type-box {
      display: none;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      background: #fcfdff;
    }

    .days-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(4, minmax(80px, 1fr));
      margin-top: 8px;
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .task-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .task-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .task-name {
      font-weight: 700;
      color: var(--task-color);
      word-break: break-word;
    }

    .meta {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .category-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.82rem;
      background: #e0e7ff;
      color: #3730a3;
      font-weight: 700;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fff;
    }

    .preview-item {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }

    .check-box {
      width: 32px;
      height: 32px;
      border: 3px solid var(--box-color);
      border-radius: 6px;
      display: inline-block;
      flex: 0 0 32px;
    }

    .preview-task-text {
      color: var(--task-color);
      font-weight: 700;
      font-size: 1.02rem;
    }

    .color-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, 1fr);
      margin-top: 14px;
    }

    .color-field {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    input[type="color"] {
      width: 46px;
      height: 34px;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .home-buttons,
      .grid,
      .schedule-types,
      .color-grid {
        grid-template-columns: 1fr;
      }

      .days-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .app-title {
        font-size: 1.45rem;
      }

      .top-date {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header-card">
      <div id="topDate" class="top-date"></div>
      <h1 class="app-title">مدير مهام العائلة</h1>
    </header>

    <section id="homeView" class="card view active">
      <h2>الصفحة الرئيسية</h2>
      <p class="muted" style="margin-bottom:12px;">اختر الإجراء الذي تريد تنفيذه:</p>
      <div class="home-buttons">
        <button id="goAddBtn" class="btn-main">إضافة قائمة</button>
        <button id="goEditBtn" class="btn-main">تعديل قائمة</button>
        <button id="goDeleteBtn" class="btn-main">حذف قائمة</button>
        <button id="goPreviewBtn" class="btn-main">معاينة القائمة</button>
      </div>
    </section>

    <section id="manageView" class="card view">
      <div class="btn-row">
        <button id="backFromManageBtn" class="btn-back">الرجوع للرئيسية</button>
      </div>
      <h2>إدارة القائمة</h2>
      <p id="manageHint" class="muted">يمكنك الآن إضافة مهام جديدة أو تعديل وحذف المهام الحالية.</p>

      <form id="taskForm">
        <input id="editingTaskId" type="hidden">
        <div class="grid">
          <div class="field">
            <label for="taskName">اسم المهمة</label>
            <input id="taskName" type="text" placeholder="مثال: تنظيف المطبخ" required>
          </div>
          <div class="field">
            <label for="taskCategory">التصنيف</label>
            <select id="taskCategory">
              <option value="تنظيف">تنظيف</option>
              <option value="مشتريات">مشتريات</option>
              <option value="العائلة">العائلة</option>
              <option value="أخرى">أخرى</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>نوع المهمة</label>
          <div class="schedule-types">
            <label class="option"><input type="radio" name="taskType" value="daily" checked> يومي</label>
            <label class="option"><input type="radio" name="taskType" value="specificDays"> أيام محددة</label>
            <label class="option"><input type="radio" name="taskType" value="weekly"> أسبوعي</label>
            <label class="option"><input type="radio" name="taskType" value="monthly"> شهري</label>
          </div>
        </div>

        <div id="daysBox" class="type-box">
          <p class="muted">اختر الأيام:</p>
          <div class="days-grid">
            <label class="option"><input type="checkbox" value="0" class="day-checkbox"> الأحد</label>
            <label class="option"><input type="checkbox" value="1" class="day-checkbox"> الإثنين</label>
            <label class="option"><input type="checkbox" value="2" class="day-checkbox"> الثلاثاء</label>
            <label class="option"><input type="checkbox" value="3" class="day-checkbox"> الأربعاء</label>
            <label class="option"><input type="checkbox" value="4" class="day-checkbox"> الخميس</label>
            <label class="option"><input type="checkbox" value="5" class="day-checkbox"> الجمعة</label>
            <label class="option"><input type="checkbox" value="6" class="day-checkbox"> السبت</label>
          </div>
        </div>

        <div id="monthlyBox" class="type-box">
          <div class="field">
            <label for="monthlyDayInput">يوم التنفيذ الشهري (1 - 31)</label>
            <input id="monthlyDayInput" type="number" min="1" max="31" value="1">
          </div>
        </div>

        <div class="btn-row">
          <button id="submitBtn" type="submit" class="btn-main">إضافة المهمة</button>
          <button id="cancelEditBtn" type="button" class="btn-back" style="display:none;">إلغاء التعديل</button>
        </div>
      </form>

      <h2 style="margin-top:16px;">تخصيص الألوان</h2>
      <div class="color-grid">
        <div class="color-field">
          <label for="titleColorInput">لون العنوان</label>
          <input id="titleColorInput" type="color">
        </div>
        <div class="color-field">
          <label for="dateColorInput">لون التاريخ</label>
          <input id="dateColorInput" type="color">
        </div>
        <div class="color-field">
          <label for="taskColorInput">لون المهام</label>
          <input id="taskColorInput" type="color">
        </div>
        <div class="color-field">
          <label for="boxColorInput">لون المربعات</label>
          <input id="boxColorInput" type="color">
        </div>
      </div>

      <h2 style="margin-top:16px;">كل المهام</h2>
      <div id="allTasksList" class="list"></div>
    </section>

    <section id="previewView" class="card view">
      <div class="btn-row">
        <button id="backFromPreviewBtn" class="btn-back">الرجوع للرئيسية</button>
      </div>
      <h2>معاينة القائمة (مهام اليوم)</h2>
      <p id="todayInfo" class="muted"></p>
      <div id="previewTasksList" class="list"></div>
      <button id="printBtn" class="btn-print">طباعة القائمة</button>
    </section>
  </div>

  <script>
    const TASKS_KEY = "familyTasks_v2";
    const COLORS_KEY = "familyTheme_v1";

    const arabicDays = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
    const arabicTypeNames = {
      daily: "يومي",
      specificDays: "أيام محددة",
      weekly: "أسبوعي",
      monthly: "شهري"
    };

    const topDate = document.getElementById("topDate");
    const homeView = document.getElementById("homeView");
    const manageView = document.getElementById("manageView");
    const previewView = document.getElementById("previewView");
    const goAddBtn = document.getElementById("goAddBtn");
    const goEditBtn = document.getElementById("goEditBtn");
    const goDeleteBtn = document.getElementById("goDeleteBtn");
    const goPreviewBtn = document.getElementById("goPreviewBtn");
    const backFromManageBtn = document.getElementById("backFromManageBtn");
    const backFromPreviewBtn = document.getElementById("backFromPreviewBtn");
    const manageHint = document.getElementById("manageHint");

    const taskForm = document.getElementById("taskForm");
    const editingTaskIdInput = document.getElementById("editingTaskId");
    const taskNameInput = document.getElementById("taskName");
    const taskCategorySelect = document.getElementById("taskCategory");
    const submitBtn = document.getElementById("submitBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const monthlyDayInput = document.getElementById("monthlyDayInput");
    const daysBox = document.getElementById("daysBox");
    const monthlyBox = document.getElementById("monthlyBox");
    const dayCheckboxes = document.querySelectorAll(".day-checkbox");
    const allTasksList = document.getElementById("allTasksList");
    const todayInfo = document.getElementById("todayInfo");
    const previewTasksList = document.getElementById("previewTasksList");
    const printBtn = document.getElementById("printBtn");

    const titleColorInput = document.getElementById("titleColorInput");
    const dateColorInput = document.getElementById("dateColorInput");
    const taskColorInput = document.getElementById("taskColorInput");
    const boxColorInput = document.getElementById("boxColorInput");

    let tasks = loadTasks();
    let colors = loadColors();

    function loadTasks() {
      const raw = localStorage.getItem(TASKS_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
    }

    function loadColors() {
      const defaults = {
        titleColor: "#1e3a8a",
        dateColor: "#0f766e",
        taskColor: "#111827",
        boxColor: "#2563eb"
      };
      const raw = localStorage.getItem(COLORS_KEY);
      if (!raw) return defaults;
      try {
        return { ...defaults, ...JSON.parse(raw) };
      } catch (error) {
        return defaults;
      }
    }

    function saveColors() {
      localStorage.setItem(COLORS_KEY, JSON.stringify(colors));
    }

    function applyColors() {
      document.documentElement.style.setProperty("--title-color", colors.titleColor);
      document.documentElement.style.setProperty("--date-color", colors.dateColor);
      document.documentElement.style.setProperty("--task-color", colors.taskColor);
      document.documentElement.style.setProperty("--box-color", colors.boxColor);
      titleColorInput.value = colors.titleColor;
      dateColorInput.value = colors.dateColor;
      taskColorInput.value = colors.taskColor;
      boxColorInput.value = colors.boxColor;
    }

    function showView(viewName) {
      [homeView, manageView, previewView].forEach((view) => view.classList.remove("active"));
      if (viewName === "home") homeView.classList.add("active");
      if (viewName === "manage") manageView.classList.add("active");
      if (viewName === "preview") previewView.classList.add("active");
      if (viewName === "preview") renderPreviewTasks();
    }

    function formatDate(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${d}-${m}-${y}`;
    }

    function formatDayAndDateLabel(dateObj) {
      const dayName = arabicDays[dateObj.getDay()];
      const dateText = formatDate(dateObj);
      return `${dayName} | ${dateText}`;
    }

    function updateTopDate() {
      const today = new Date();
      topDate.textContent = formatDayAndDateLabel(today);
    }

    function getSelectedType() {
      const selected = document.querySelector('input[name="taskType"]:checked');
      return selected ? selected.value : "daily";
    }

    function getSelectedDays() {
      return Array.from(dayCheckboxes).filter((c) => c.checked).map((c) => Number(c.value));
    }

    function setSelectedDays(days) {
      dayCheckboxes.forEach((c) => {
        c.checked = Array.isArray(days) && days.includes(Number(c.value));
      });
    }

    function setType(type) {
      const radio = document.querySelector(`input[name="taskType"][value="${type}"]`);
      if (radio) radio.checked = true;
      toggleTypeBoxes();
    }

    function toggleTypeBoxes() {
      const type = getSelectedType();
      daysBox.style.display = type === "specificDays" ? "block" : "none";
      monthlyBox.style.display = type === "monthly" ? "block" : "none";
    }

    function getMonthlyDay() {
      const value = Number(monthlyDayInput.value);
      if (Number.isNaN(value)) return 1;
      return Math.min(31, Math.max(1, value));
    }

    function resetFormToAdd() {
      editingTaskIdInput.value = "";
      taskForm.reset();
      submitBtn.textContent = "إضافة المهمة";
      cancelEditBtn.style.display = "none";
      setType("daily");
      setSelectedDays([]);
      monthlyDayInput.value = "1";
      taskNameInput.focus();
    }

    function enterEditMode(task) {
      editingTaskIdInput.value = task.id;
      taskNameInput.value = task.name;
      taskCategorySelect.value = task.category;
      setType(task.type);
      setSelectedDays(task.days || []);
      monthlyDayInput.value = String(task.monthlyDay || 1);
      submitBtn.textContent = "حفظ التعديلات";
      cancelEditBtn.style.display = "inline-block";
      taskNameInput.focus();
      taskNameInput.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function isTaskForToday(task, todayDate) {
      const dayOfWeek = todayDate.getDay();
      const dayOfMonth = todayDate.getDate();
      if (task.type === "daily") return true;
      if (task.type === "specificDays") return Array.isArray(task.days) && task.days.includes(dayOfWeek);
      if (task.type === "weekly") return true;
      if (task.type === "monthly") return dayOfMonth === (task.monthlyDay || 1);
      return false;
    }

    function getTodayTasks() {
      const today = new Date();
      return tasks.filter((task) => isTaskForToday(task, today));
    }

    function getScheduleText(task) {
      const typeLabel = arabicTypeNames[task.type] || task.type;
      if (task.type === "specificDays") {
        const days = (task.days || []).map((d) => arabicDays[d]).join("، ");
        return `${typeLabel} - ${days}`;
      }
      if (task.type === "monthly") {
        return `${typeLabel} - يوم ${task.monthlyDay || 1}`;
      }
      return typeLabel;
    }

    function renderAllTasks() {
      if (tasks.length === 0) {
        allTasksList.innerHTML = '<p class="empty">لا توجد مهام محفوظة.</p>';
        return;
      }
      allTasksList.innerHTML = "";
      tasks.forEach((task) => {
        const item = document.createElement("div");
        item.className = "task-item";
        item.innerHTML = `
          <div class="task-head">
            <div class="task-name">${escapeHtml(task.name)}</div>
            <div class="task-actions">
              <button class="btn-edit" data-action="edit" data-id="${task.id}">تعديل</button>
              <button class="btn-delete" data-action="delete" data-id="${task.id}">حذف</button>
            </div>
          </div>
          <div class="meta">
            <span class="category-tag">${escapeHtml(task.category)}</span>
            <span> | ${escapeHtml(getScheduleText(task))}</span>
          </div>
        `;
        allTasksList.appendChild(item);
      });
    }

    function groupTasksByCategory(list) {
      const groups = { تنظيف: [], مشتريات: [], العائلة: [], أخرى: [] };
      list.forEach((task) => {
        const category = groups[task.category] ? task.category : "أخرى";
        groups[category].push(task);
      });
      return groups;
    }

    function renderPreviewTasks() {
      const today = new Date();
      todayInfo.textContent = formatDayAndDateLabel(today);

      const todayTasks = getTodayTasks();
      const grouped = groupTasksByCategory(todayTasks);
      previewTasksList.innerHTML = "";

      if (todayTasks.length === 0) {
        previewTasksList.innerHTML = '<p class="empty">لا توجد مهام مطلوبة اليوم.</p>';
        return;
      }

      Object.keys(grouped).forEach((category) => {
        if (grouped[category].length === 0) return;
        const block = document.createElement("div");
        block.className = "task-item";
        const tasksHtml = grouped[category].map((task) => `
          <div class="preview-item">
            <span class="check-box"></span>
            <span class="preview-task-text">${escapeHtml(task.name)}</span>
          </div>
        `).join("");
        block.innerHTML = `
          <div class="meta"><span class="category-tag">${category}</span></div>
          ${tasksHtml}
        `;
        previewTasksList.appendChild(block);
      });
    }

    function handleSaveTask(event) {
      event.preventDefault();
      const name = taskNameInput.value.trim();
      const category = taskCategorySelect.value;
      const type = getSelectedType();
      const days = type === "specificDays" ? getSelectedDays() : [];
      const monthlyDay = type === "monthly" ? getMonthlyDay() : 1;

      if (!name) {
        alert("من فضلك اكتب اسم المهمة.");
        return;
      }
      if (type === "specificDays" && days.length === 0) {
        alert("من فضلك اختر يومًا واحدًا على الأقل.");
        return;
      }

      const editingId = editingTaskIdInput.value;
      if (editingId) {
        tasks = tasks.map((task) => {
          if (task.id !== editingId) return task;
          return { ...task, name, category, type, days, monthlyDay };
        });
      } else {
        tasks.push({
          id: Date.now().toString(),
          name,
          category,
          type,
          days,
          monthlyDay
        });
      }

      saveTasks();
      renderAllTasks();
      resetFormToAdd();
    }

    function handleTaskActions(event) {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const id = button.dataset.id;
      const action = button.dataset.action;
      const task = tasks.find((t) => t.id === id);
      if (!task) return;

      if (action === "delete") {
        tasks = tasks.filter((t) => t.id !== id);
        saveTasks();
        renderAllTasks();
        renderPreviewTasks();
        if (editingTaskIdInput.value === id) resetFormToAdd();
      } else if (action === "edit") {
        enterEditMode(task);
      }
    }

    function printPreviewList() {
      const today = new Date();
      const dayAndDateText = formatDayAndDateLabel(today);
      const todayTasks = getTodayTasks();
      const grouped = groupTasksByCategory(todayTasks);

      const sectionsHtml = Object.keys(grouped).map((category) => {
        const items = grouped[category];
        if (items.length === 0) return "";
        const itemsHtml = items.map((task) => `
          <li>
            <span class="box"></span>
            <span>${escapeHtml(task.name)}</span>
          </li>
        `).join("");
        return `
          <section>
            <h3>${category}</h3>
            <ul>${itemsHtml}</ul>
          </section>
        `;
      }).join("");

      const printableContent = sectionsHtml || "<p>لا توجد مهام مطلوبة اليوم.</p>";
      const printWindow = window.open("", "_blank");
      if (!printWindow) {
        alert("لم نتمكن من فتح نافذة الطباعة. تأكد من السماح بالنوافذ المنبثقة.");
        return;
      }

      const html = `
        <!DOCTYPE html>
        <html lang="ar" dir="rtl">
        <head>
          <meta charset="UTF-8">
          <title>طباعة القائمة</title>
          <style>
            body {
              font-family: Tahoma, Arial, sans-serif;
              padding: 24px;
              color: #111827;
              line-height: 1.7;
            }
            .print-header {
              position: relative;
              min-height: 62px;
              margin-bottom: 14px;
            }
            h1 {
              margin: 0;
              text-align: center;
              color: ${colors.titleColor};
            }
            .meta {
              position: absolute;
              left: 0;
              top: 8px;
              text-align: left;
              direction: ltr;
              color: ${colors.dateColor};
            }
            section {
              margin-bottom: 16px;
            }
            h3 {
              margin-bottom: 8px;
              border-bottom: 1px solid #d1d5db;
              padding-bottom: 4px;
            }
            ul {
              list-style: none;
              margin: 0;
              padding: 0;
            }
            li {
              margin-bottom: 9px;
              display: flex;
              align-items: center;
              gap: 10px;
              color: ${colors.taskColor};
              font-weight: 700;
            }
            .box {
              width: 32px;
              height: 32px;
              border: 3px solid ${colors.boxColor};
              border-radius: 6px;
              display: inline-block;
              flex: 0 0 32px;
            }
            .footer {
              margin-top: 30px;
              border-top: 1px dashed #9ca3af;
              padding-top: 12px;
            }
          </style>
        </head>
        <body>
          <div class="print-header">
            <h1>قائمة مهام اليوم</h1>
            <p class="meta">${dayAndDateText}</p>
          </div>
          ${printableContent}
          <div class="footer">تم التنفيذ بواسطة: ____________________</div>
          <script>
            window.onload = function () { window.print(); };
          <\/script>
        </body>
        </html>
      `;

      printWindow.document.open();
      printWindow.document.write(html);
      printWindow.document.close();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    goAddBtn.addEventListener("click", () => {
      manageHint.textContent = "وضع الإضافة: أضف مهام جديدة.";
      showView("manage");
      resetFormToAdd();
    });
    goEditBtn.addEventListener("click", () => {
      manageHint.textContent = "وضع التعديل: اختر مهمة من الأسفل واضغط تعديل.";
      showView("manage");
    });
    goDeleteBtn.addEventListener("click", () => {
      manageHint.textContent = "وضع الحذف: اختر مهمة من الأسفل واضغط حذف.";
      showView("manage");
    });
    goPreviewBtn.addEventListener("click", () => showView("preview"));
    backFromManageBtn.addEventListener("click", () => showView("home"));
    backFromPreviewBtn.addEventListener("click", () => showView("home"));
    taskForm.addEventListener("submit", handleSaveTask);
    cancelEditBtn.addEventListener("click", resetFormToAdd);
    allTasksList.addEventListener("click", handleTaskActions);
    printBtn.addEventListener("click", printPreviewList);
    document.querySelectorAll('input[name="taskType"]').forEach((radio) => {
      radio.addEventListener("change", toggleTypeBoxes);
    });

    titleColorInput.addEventListener("input", () => {
      colors.titleColor = titleColorInput.value;
      applyColors();
      saveColors();
    });
    dateColorInput.addEventListener("input", () => {
      colors.dateColor = dateColorInput.value;
      applyColors();
      saveColors();
    });
    taskColorInput.addEventListener("input", () => {
      colors.taskColor = taskColorInput.value;
      applyColors();
      saveColors();
    });
    boxColorInput.addEventListener("input", () => {
      colors.boxColor = boxColorInput.value;
      applyColors();
      saveColors();
    });

    applyColors();
    updateTopDate();
    toggleTypeBoxes();
    resetFormToAdd();
    renderAllTasks();
    renderPreviewTasks();
  </script>
</body>
</html>
